<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Genshin: Inventory System</title>
    <style>
        body {
            background-color: #0f1225;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 { color: #ffd700; text-shadow: 0 0 10px #ffd700; }

        /* Верхняя панель */
        .top-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #4a5866;
            min-width: 120px;
        }

        .highlight { color: #ffd700; font-weight: bold; font-size: 18px; }
        .pity-text { color: #aebbc4; font-size: 12px; }

        .farm-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            color: #003366;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px #00f2fe;
            transition: 0.1s;
        }
        .farm-btn:active { transform: scale(0.95); }

        /* Карточка результата */
        .carousel-container {
            position: relative;
            width: 280px;
            height: 400px;
            margin: 0 auto;
        }

        .card {
            width: 100%;
            height: 100%;
            background: #16213e;
            border-radius: 20px;
            overflow: hidden;
            border: 5px solid #ccc;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .img-area {
            height: 70%;
            background: #2a2a40;
            position: relative;
            overflow: hidden;
        }

        .char-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0; left: 0;
        }
        
        .fallback-emoji {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            z-index: 0;
            opacity: 0.5;
        }

        .card-info {
            height: 30%;
            background: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0.8));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            z-index: 2;
        }

        .name { font-size: 22px; font-weight: bold; text-transform: uppercase; }
        .stars { font-size: 16px; letter-spacing: 2px; margin-top: 5px; }
        .new-tag { color: #4caf50; font-size: 12px; font-weight: bold; display: none; }

        /* Цвета редкости */
        .blue { border-color: #3c9cf7; box-shadow: 0 0 20px #3c9cf7; }
        .blue .name { color: #3c9cf7; }
        
        .purple { border-color: #a256e1; box-shadow: 0 0 25px #a256e1; }
        .purple .name { color: #d896ff; }
        
        .gold { border-color: #ffd700; box-shadow: 0 0 40px #ffd700; animation: pulseGold 2s infinite; }
        .gold .name { color: #ffd700; text-shadow: 0 0 10px #ffd700; }

        @keyframes pulseGold {
            0% { box-shadow: 0 0 30px #ffd700; }
            50% { box-shadow: 0 0 60px #ffd700; }
            100% { box-shadow: 0 0 30px #ffd700; }
        }

        .nav-btn {
            position: absolute;
            top: 40%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 20px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
        }
        .prev { left: -40px; }
        .next { right: -40px; }

        .controls { margin-top: 20px; }
        .wish-btn {
            background: #ece5d8;
            color: #3b4255;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }
        .wish-btn:hover { background: white; transform: scale(1.05); }

        /* ИНВЕНТАРЬ */
        .inventory-section {
            margin-top: 40px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            background: rgba(16, 20, 35, 0.9);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #4a5866;
        }

        .inv-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid #4a5866;
            color: #aebbc4;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #ffd700;
            color: #000;
            border-color: #ffd700;
            font-weight: bold;
        }

        .inv-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .inv-item {
            background: #1e2535;
            border-radius: 8px;
            padding: 5px;
            position: relative;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .inv-item:hover { transform: scale(1.1); z-index: 5; }
        .inv-item.i-5 { border-color: #ffd700; box-shadow: 0 0 10px #ffd700; }
        .inv-item.i-4 { border-color: #a256e1; }
        .inv-item.i-3 { border-color: #3c9cf7; }

        .inv-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 4px;
            background: #000;
        }

        .inv-count {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: rgba(0,0,0,0.8);
            color: white;
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>✨Симулятор молитв✨</h1>
    
    <div class="top-bar">
        <button class="farm-btn" onclick="farmGems()">+160💎</button>
        <div class="stat-box">
            <div class="pity-text">Примогемы</div>
            <span id="gem-count" class="highlight">0</span>
        </div>
        <div class="stat-box">
            <div class="pity-text">Гарант (Pity)</div>
            <span id="pity-counter" class="highlight">0</span>/90
        </div>
        <div class="stat-box">
            <div class="pity-text">Гарант Баннера</div>
            <span id="guarantee-status" style="color: #d32f2f;">НЕТ</span>
        </div>
    </div>

    <div class="carousel-container">
        <button class="nav-btn prev" onclick="changeSlide(-1)">&#10094;</button>
        
        <div id="card" class="card blue">
            <div class="img-area">
                <div class="fallback-emoji" id="emoji-back">❓</div>
                <img id="char-img" class="char-img" src="" alt="Char">
            </div>
            <div class="card-info">
                <div class="name" id="itemName">Paimon</div>
                <div class="stars" id="itemStars"></div>
                <div id="new-tag" class="new-tag">НОВЫЙ!</div>
            </div>
        </div>

        <button class="nav-btn next" onclick="changeSlide(1)">&#10095;</button>
    </div>
    
    <div class="counter" id="slide-counter" style="margin-top:10px; color:#888;">Нажми "Молиться"</div>

    <div class="controls">
        <button class="wish-btn" onclick="startWish(1)">Молиться x1 (160💎)</button>
        <button class="wish-btn" onclick="startWish(10)">Молиться x10 (1600💎)</button>
    </div>

    <!-- ИНВЕНТАРЬ -->
    <div class="inventory-section">
        <div class="inv-tabs">
            <button class="tab-btn active" onclick="switchTab('chars')">👤 Персонажи</button>
            <button class="tab-btn" onclick="switchTab('weapons')">⚔️ Оружие</button>
        </div>
        
        <div id="inv-chars" class="inv-grid">
            <!-- Сюда падают персонажи -->
        </div>
        <div id="inv-weapons" class="inv-grid" style="display:none;">
            <!-- Сюда падает оружие -->
        </div>
    </div>

    <script>
        let gems = 0;
        let pity = 0;
        let guaranteedBanner = false;
        
        let currentPulls = [];
        let currentIndex = 0;

        // Инвентарь игрока
        let myInventory = {}; 

        // База данных
        const db = [
            // 5* Персонажи
            { id: "hutao", name: "Ху Тао", type: "char", stars: 5, emoji: "🦋", img: "images/Ху тао.webp" },
            { id: "navia", name: "Навия", type: "char", stars: 5, emoji: "☂️", img: "images/Навия.webp" },
            { id: "neuvillette", name: "Нёвиллет", type: "char", stars: 5, emoji: "⚖️", img: "images/чо это.png" },
            
            // 5* Стандарт (Проигрыш 50/50)
            { id: "dehya", name: "Дехья", type: "char", stars: 5, emoji: "🔥", img: "images/Dehya_2.webp" },
            { id: "qiqi", name: "Ци Ци", type: "char", stars: 5, emoji: "🧟", img: "images/чича.webp" },

            // 4* Персонажи
            { id: "bennett", name: "Беннет", type: "char", stars: 4, emoji: "🔥", img: "images/беннет.webp" },
            { id: "fishl", name: "Фишль", type: "char", stars: 4, emoji: "🦅", img: "images/фишль.webp" },
            { id: "barbara", name: "Барбара", type: "char", stars: 4, emoji: "💧", img: "images/барбара.webp" },

            // 3* Оружие
            { id: "tassel", name: "Дубина", type: "weapon", stars: 3, img: "images/дубина.jpg" },
            { id: "bow", name: "Лук", type: "weapon", stars: 3, img: "images/лук.webp" },
            { id: "sword", name: "Меч", type: "weapon", stars: 3, img: "images/меч.webp" }
        ];

        function farmGems() {
            gems += 160;
            document.getElementById('gem-count').innerText = gems;
        }

        function updateStats() {
            document.getElementById('pity-counter').innerText = pity;
            const guarEl = document.getElementById('guarantee-status');
            if (guaranteedBanner) {
                guarEl.innerText = "ДА (100%)";
                guarEl.style.color = "#4caf50";
            } else {
                guarEl.innerText = "НЕТ (50/50)";
                guarEl.style.color = "#d32f2f";
            }
        }

        function getOnePull() {
            pity++;
            let isFiveStar = false;
            
            if (pity >= 90) isFiveStar = true;
            else if (pity >= 74) {
                if (Math.random() * 100 < (6 + (pity - 73) * 6)) isFiveStar = true;
            } else {
                if (Math.random() < 0.006) isFiveStar = true;
            }

            let item;

            if (isFiveStar) {
                pity = 0;
                let pool;
                if (guaranteedBanner) {
                    pool = db.filter(i => i.stars === 5 && i.type === 'char' && (i.id === 'hutao' || i.id === 'navia' || i.id === 'neuvillette'));
                    guaranteedBanner = false;
                } else {
                    if (Math.random() < 0.5) {
                        pool = db.filter(i => i.stars === 5 && i.type === 'char' && (i.id === 'hutao' || i.id === 'navia' || i.id === 'neuvillette'));
                    } else {
                        pool = db.filter(i => i.stars === 5 && i.type === 'char' && (i.id === 'dehya' || i.id === 'qiqi'));
                        guaranteedBanner = true;
                    }
                }
                item = pool[Math.floor(Math.random() * pool.length)];
            } 
            else if (Math.random() < 0.05) {
                // 4 звезды (упрощено, только персонажи для примера)
                let pool = db.filter(i => i.stars === 4);
                item = pool[Math.floor(Math.random() * pool.length)];
            } 
            else {
                // 3 звезды (оружие)
                let pool = db.filter(i => i.stars === 3);
                item = pool[Math.floor(Math.random() * pool.length)];
            }

            // Добавляем в инвентарь
            addToInventory(item);
            return item;
        }

        function addToInventory(item) {
            if (!myInventory[item.id]) {
                myInventory[item.id] = { ...item, count: 1 };
            } else {
                myInventory[item.id].count++;
            }
            renderInventory();
        }

        function renderInventory() {
            const charContainer = document.getElementById('inv-chars');
            const weaponContainer = document.getElementById('inv-weapons');
            
            charContainer.innerHTML = '';
            weaponContainer.innerHTML = '';

            for (let key in myInventory) {
                let item = myInventory[key];
                let div = document.createElement('div');
                div.className = `inv-item i-${item.stars}`;
                
                let suffix = item.type === 'char' ? `C${item.count - 1}` : `R${item.count}`;
                if (item.count > 1) suffix = `<span style="color:#ffd700">${suffix}</span>`;
                else suffix = "";

                div.innerHTML = `
                    <img src="${item.img}" class="inv-img" onerror="this.src=''; this.parentElement.innerText='${item.emoji}'">
                    <div class="inv-count">${suffix}</div>
                `;

                if (item.type === 'char') charContainer.appendChild(div);
                else weaponContainer.appendChild(div);
            }
        }

        function startWish(amount) {
            let cost = amount * 160;
            if (gems < cost) { alert("Не хватает примогемов!"); return; }

            gems -= cost;
            document.getElementById('gem-count').innerText = gems;

            currentPulls = [];
            for(let i=0; i<amount; i++) currentPulls.push(getOnePull());

            currentIndex = 0;
            updateCard();
            updateStats();
        }

        function changeSlide(direction) {
            if (currentPulls.length === 0) return;
            currentIndex += direction;
            if (currentIndex >= currentPulls.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = currentPulls.length - 1;
            updateCard();
        }

        function updateCard() {
            if (currentPulls.length === 0) return;
            let item = currentPulls[currentIndex];
            let card = document.getElementById('card');
            let imgEl = document.getElementById('char-img');
            let emojiEl = document.getElementById('emoji-back');
            let newTag = document.getElementById('new-tag');
            
            card.className = "card";
            if (item.stars === 5) card.classList.add("gold");
            else if (item.stars === 4) card.classList.add("purple");
            else card.classList.add("blue");

            document.getElementById('itemName').innerText = item.name;
            document.getElementById('itemStars').innerText = "⭐".repeat(item.stars);
            document.getElementById('slide-counter').innerText = `Предмет ${currentIndex + 1} из ${currentPulls.length}`;
            emojiEl.innerText = item.emoji;

            // Проверка на новинку
            if (myInventory[item.id].count === 1) {
                newTag.style.display = "block";
                newTag.innerText = item.type === 'char' ? "НОВЫЙ ПЕРСОНАЖ!" : "НОВОЕ ОРУЖИЕ!";
            } else {
                newTag.style.display = "none";
            }

            imgEl.src = item.img;
            imgEl.style.display = 'block';
            imgEl.onerror = function() { this.style.display = 'none'; emojiEl.style.opacity = '1'; };
        }

        function switchTab(tab) {
            document.getElementById('inv-chars').style.display = tab === 'chars' ? 'grid' : 'none';
            document.getElementById('inv-weapons').style.display = tab === 'weapons' ? 'grid' : 'none';
            
            const btns = document.querySelectorAll('.tab-btn');
            btns[0].classList.toggle('active', tab === 'chars');
            btns[1].classList.toggle('active', tab === 'weapons');
        }
    </script>

</body>
</html>
